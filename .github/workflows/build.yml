name: build

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  jar:
    runs-on: ubuntu-latest
    # First run builds 18 Spigot versions with BuildTools (~2h); afterwards the
    # Maven repository cache makes this a few minutes.
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 16
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 16

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Cache local Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: m2-${{ hashFiles('.github/ci/spigot-versions.txt') }}
          restore-keys: |
            m2-

      - name: Install Spigot artifacts with BuildTools
        run: bash .github/ci/run-buildtools.sh "$GITHUB_WORKSPACE"

      - name: Generate RealisticSeasons compile stub
        run: bash .github/ci/make-realisticseasons-stub.sh

      - name: Build plugin
        run: mvn -B -ntp -DskipTests package

      - name: Upload plugin jar
        uses: actions/upload-artifact@v4
        with:
          name: realisticsurvival-${{ github.sha }}
          path: target/realisticsurvival-*.jar
          if-no-files-found: error
